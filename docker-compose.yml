# Compose for Arcanada Assistant (dev + prod).
# All bindings are loopback-only by design (SEC-0006). Production reaches
# Postgres/Redis through the docker network only — never via the host's
# public interface. Secrets MUST be Vault-injected via .env on deploy.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: assistant_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (Vault-injected)}
      POSTGRES_DB: assistant
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U assistant_app -d assistant']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--requirepass',
        '${REDIS_PASSWORD:?REDIS_PASSWORD required (Vault-injected)}',
      ]
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping']
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required (Vault-injected)}

  assistant:
    build:
      context: .
      dockerfile: apps/assistant/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3800
      LOG_LEVEL: info
      DATABASE_URL: postgresql://assistant_app:${POSTGRES_PASSWORD}@postgres:5432/assistant?schema=public&sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-changeme}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-changemechangemechangemechangeme}
      TELEGRAM_WEBHOOK_PATH: /webhook/telegram
      AUTH_ARCANA_BASE_URL: https://auth.arcanada.one
      AUTH_ARCANA_JWKS_URL: https://auth.arcanada.one/.well-known/jwks.json
      AUTH_ARCANA_JWT_ISSUER: https://auth.arcanada.one
      AUTH_ARCANA_JWT_AUDIENCE: arcanada-assistant
      MODEL_CONNECTOR_BASE_URL: http://connector.arcanada.one:3900
      MODEL_CONNECTOR_DEFAULT_MODEL: anthropic/claude-haiku-4-5
      MODEL_CONNECTOR_API_KEY: ${MODEL_CONNECTOR_API_KEY:-changeme}
      # INFRA-0240: hostname `arcana-db` not resolvable inside docker (no MagicDNS); fall back to Tailscale IP for arcana-db. Override via .env on hosts с разной топологией.
      SCRUTATOR_BASE_URL: ${SCRUTATOR_BASE_URL:-http://100.70.137.104:8310}
      SCRUTATOR_LTM_NAMESPACE: assistant-ltm-pavel
      # ARCA-0154: reach OpsBot /metrics over the internal docker network
      # (opsbot_default). The public https://ops.arcanada.one/metrics returns
      # 403 (nginx allowlist) even with a valid Bearer; the internal endpoint
      # returns 200. Zod relaxed to allow http:// only for docker-internal /
      # loopback hosts (see apps/assistant/src/config/url-schemas.ts). Override
      # via .env on hosts that are not joined to opsbot_default.
      OPSBOT_BASE_URL: ${OPSBOT_BASE_URL:-http://opsbot:3600}
      OPSBOT_API_KEY: ${OPSBOT_API_KEY:-changeme}
      MUNERA_BASE_URL: ${MUNERA_BASE_URL:-https://muneral.com}
      MUNERA_API_TOKEN: ${MUNERA_API_TOKEN:-changeme}
      # INFRA-0240: mesh-auth API key (Zod .optional(); placeholder satisfies min(1) Zod check для dev/test).
      MESH_VAULT_API_KEY: ${MESH_VAULT_API_KEY:-arc_api_placeholder_dev_not_set_value_padding_padding}
      BRIEFING_TIMEZONE: Europe/Istanbul
      BRIEFING_MORNING_TIME: '08:00'
      BRIEFING_EVENING_TIME: '21:00'
      # ARCA-0010 proactive config — file-backed (Vault SDK deferred per task-description § Implementation Notes #3).
      # Module loads YAML at boot + 5-min poll; missing path ⇒ module idle.
      PROACTIVE_CONFIG_PATH: /etc/arcanada/proactive-config.yaml
      # ARCA-0154: datarim KB root delivered to the host by rsync (see
      # task-description § Deploy-runbook). DatarimReaderService resolves
      # DATARIM_PATH; readArchivedToday climbs to <root>/../documentation/archive,
      # so the bind below mounts the KB ROOT (/data/arcanada-kb), not just datarim/.
      # Missing host dir ⇒ sourceAvailable()=false ⇒ degraded marker (not silent empty).
      DATARIM_PATH: ${DATARIM_PATH:-/data/arcanada-kb/datarim}
    ports:
      - '127.0.0.1:3800:3800'
    networks:
      - default
      # ARCA-0154: join the existing OpsBot docker network so http://opsbot:3600
      # resolves (container-to-container, Tier 0; no host port published).
      - opsbot_default
    volumes:
      # Read-only bind for the proactive-config directory. Host dir deployed by
      # operator (see datarim/tasks/ARCA-0010-task-description.md § Operator
      # Handoff). Dir-bind (not file-bind) is intentional: prevents Docker from
      # silently creating an empty directory at the file path on dev hosts
      # where /etc/arcanada/proactive-config.yaml is absent — ProactiveModule
      # then catches ENOENT and stays idle (graceful degradation).
      - /etc/arcanada:/etc/arcanada:ro
      # ARCA-0154: read-only KB root (datarim/ + documentation/archive/). Same
      # dir-bind rationale as above: a missing host dir degrades gracefully
      # (sourceAvailable()=false) rather than creating an empty masking dir.
      - /data/arcanada-kb:/data/arcanada-kb:ro

networks:
  default: {}
  # ARCA-0154: external — created by the OpsBot compose project (opsbot_default).
  # assistant joins it read-only for /metrics; it is NOT created here.
  opsbot_default:
    external: true

volumes:
  postgres-data:
